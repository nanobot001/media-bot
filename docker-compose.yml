version: '3.8'

services:
  bot:
    image: python:3.12-slim
    container_name: movie-media-bot
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "pip install --no-cache-dir -e . && python -m moviebot.main"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./data/prowlarr-config:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
