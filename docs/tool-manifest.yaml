project:
  name: media-bot
  classification: new_tool_friendly_project
  runtime_model: pm2_python_worker
  state:
    type: sqlite
    path: data/moviebot.sqlite3
    domain_paths:
      movies: data/moviebot.sqlite3
      anime: data/animebot.sqlite3
      tv: data/tvbot.sqlite3
      tv_classic: data/tvclassicbot.sqlite3

tools:
  - name: search_library
    risk: public_read
    description: Search the local SQLite state mirror for a movie.
    input_schema:
      type: object
      properties:
        title:
          type: string
        year:
          type: integer
      required:
        - title

  - name: dedupe_check
    risk: public_read
    description: Applies the tiered normalization engine to classify input titles against the library mirror.
    input_schema:
      type: object
      properties:
        title:
          type: string
        year:
          type: integer
        imdb_id:
          type: string
      required:
        - title
        - year

  - name: search_sources
    risk: public_read
    description: Search Prowlarr indexers for movies, filtering to category 2000 and obfuscating URLs.
    input_schema:
      type: object
      properties:
        query:
          type: string
        imdb_id:
          type: string
      required:
        - query

  - name: enqueue_download
    risk: write_action
    description: Downloads torrent/magnet from Prowlarr via AllDebrid and delegates to IDM.
    input_schema:
      type: object
      properties:
        reference_id:
          type: string
        dry_run:
          type: boolean
        selected_file_id:
          type: string
      required:
        - reference_id

  - name: get_download_jobs
    risk: trusted_read
    description: Retrieve active or historical download jobs from the local database.
    input_schema:
      type: object
      properties:
        active_only:
          type: boolean
        limit:
          type: integer

  - name: get_error_logs
    risk: trusted_read
    description: Retrieve recent diagnostic error logs from the database.
    input_schema:
      type: object
      properties:
        limit:
          type: integer

  - name: query_watch_history
    risk: trusted_read
    description: Query Plex watch history logs from Tautulli to answer who watched what, when, and how.
    input_schema:
      type: object
      properties:
        user:
          type: string
        title:
          type: string
        limit:
          type: integer

  - name: resolve_pending_jobs
    risk: write_action
    description: Sweeps database for jobs in 'pending' status, queries AllDebrid, resolves direct links, sends to IDM, and updates database statuses.
    input_schema:
      type: object
      properties:
        dry_run:
          type: boolean

  - name: query_library
    risk: public_read
    description: Search the local media intelligence database with exact filters, FTS5 text matching, and optional semantic ranking.
    input_schema:
      type: object
      properties:
        query:
          type: string
        semantic_query:
          type: string
        genre:
          type: string
        director:
          type: string
        resolution:
          type: string
        watch_status:
          type: string
        max_runtime:
          type: integer
        min_rating:
          type: number
        setting_location:
          type: string
        premise_tag:
          type: string
        character_tag:
          type: string
        theme_tag:
          type: string
        tone_tag:
          type: string
        craft_tag:
          type: string
        studio:
          type: string
        actor:
          type: string
        content_rating:
          type: string
        award_tag:
          type: string
        source_material_tag:
          type: string
        popularity_tag:
          type: string
        cultural_impact_tag:
          type: string
        exclude_content_warnings:
          type: array
          items:
            type: string
        exclude_warning_level:
          type: string
          enum:
            - none
            - mild
            - moderate
            - strong
            - extreme
        include_unknown_content_warnings:
          type: boolean
        limit:
          type: integer

  - name: recommend_movies
    risk: trusted_read
    description: Recommend owned library items from local watch metrics, genres, directors, and synopsis vectors.
    input_schema:
      type: object
      properties:
        user:
          type: string
        limit:
          type: integer
        include_watched:
          type: boolean

  - name: audit_collections
    risk: public_read
    description: Report likely missing movies from Plex collections and provide confidence-scored search labels.
    input_schema:
      type: object
      properties:
        collection:
          type: string
        min_confidence:
          type: number
        limit:
          type: integer

  - name: sync_intelligence
    risk: write_action
    description: Backfill or refresh local media intelligence metadata, FTS rows, and embedding freshness markers.
    input_schema:
      type: object
      properties:
        dry_run:
          type: boolean
        limit:
          type: integer
        refresh_embeddings:
          type: boolean

  - name: sync_enrichment
    risk: write_action
    description: Generate structured enrichment metadata for library items using rule-based or Gemini providers.
    input_schema:
      type: object
      properties:
        dry_run:
          type: boolean
        limit:
          type: integer
        offset:
          type: integer
        only_missing_hard_facts:
          type: boolean
        provider:
          type: string
          enum:
            - rules
            - gemini

  - name: ask_library
    risk: public_read
    description: Ask conversational questions about your movie library using natural language (RAG).
    input_schema:
      type: object
      properties:
        question:
          type: string
      required:
        - question

  - name: get_bot_persona
    risk: public_read
    description: Retrieve active conversational persona configuration.
    input_schema:
      type: object
      properties: {}

  - name: set_bot_persona
    risk: write_action
    description: Configure or reset conversational persona.
    input_schema:
      type: object
      properties:
        persona:
          type: string
        reset:
          type: boolean

  - name: plex_section_preview
    risk: public_read
    description: Preview Plex sections mapping to canonical domains (movies, anime, tv, tv_classic) with item counts.
    input_schema:
      type: object
      properties: {}
